{{ $style := "light-without-switcher" }}
{{ if and (isset site.Params "style") (ne site.Params.style "") }}
    {{ $style = site.Params.style | lower }}
{{ end }}

{{ if not (in (slice "light-without-switcher" "dark-without-switcher" "auto-without-switcher") $style) }}
    <button class="theme-switcher">
        {{ i18n "darkTheme" }}
    </button>
{{ end }}

<script>
const STORAGE_KEY = 'user-theme-setting'
const defaultTheme = {{ $style }}

let currentTheme
let currentThemeSetting
let switchButton
let autoDefinedScheme = window.matchMedia('(prefers-color-scheme: dark)')
let usingAutoTheme = false
let autoListenerAdded = false

const autoChangeScheme = e => {
    if (!usingAutoTheme) {
        return
    }
    applyTheme(e.matches ? 'dark' : 'light')
}

document.addEventListener('DOMContentLoaded', function() {
    switchButton = document.querySelector('.theme-switcher')
    applyThemeSetting(detectCurrentScheme())

    if (switchButton) {
        changeButtonText()
        switchButton.addEventListener('click', switchTheme, false)
    }
  
    showContent()
})

function detectCurrentScheme() {
    const storedTheme = localStorage.getItem(STORAGE_KEY)
    if (isSupportedThemeSetting(storedTheme)) {
        return storedTheme
    } 
    if (defaultTheme == 'auto-without-switcher') {
        return 'auto'
    }
    if (defaultTheme == 'dark-without-switcher') {
        return 'dark'
    }
    if (defaultTheme == 'light-without-switcher') {
        return 'light'
    }
    if (isSupportedThemeSetting(defaultTheme)) {
        return defaultTheme
    } 
    if (!window.matchMedia) {
        return 'light'
    } 
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        return 'dark'
    }
    return 'light'
}

function isSupportedThemeSetting(themeSetting) {
    return themeSetting == 'auto' || themeSetting == 'dark' || themeSetting == 'light'
}

function applyTheme(theme) {
    currentTheme = theme
    document.documentElement.setAttribute('data-theme', theme)
    changeButtonText()
}

function applyThemeSetting(themeSetting) {
    currentThemeSetting = themeSetting
    usingAutoTheme = themeSetting == 'auto'
    if (usingAutoTheme) {
        autoChangeScheme(autoDefinedScheme)
        addAutoListener()
    } else {
        applyTheme(themeSetting)
    }
}

function addAutoListener() {
    if (autoListenerAdded) {
        return
    }
    autoListenerAdded = true
    if (autoDefinedScheme.addEventListener) {
        autoDefinedScheme.addEventListener('change', autoChangeScheme)
    } else {
        autoDefinedScheme.addListener(autoChangeScheme)
    }
}

function nextThemeSetting() {
    if (currentThemeSetting == 'auto') {
        return 'light'
    }
    if (currentThemeSetting == 'light') {
        return 'dark'
    }
    return 'auto'
}

function changeButtonText()
{   
    if (switchButton) {
        const nextTheme = nextThemeSetting()
        if (nextTheme == 'auto') {
            switchButton.textContent = {{ i18n "systemTheme" }}
        } else if (nextTheme == 'dark') {
            switchButton.textContent = {{ i18n "darkTheme" }}
        } else {
            switchButton.textContent = {{ i18n "lightTheme" }}
        }
    }
}

function switchTheme(e) {
    const newThemeSetting = nextThemeSetting()
    localStorage.setItem(STORAGE_KEY, newThemeSetting)
    applyThemeSetting(newThemeSetting)
}

function showContent() {
    document.body.style.visibility = 'visible';
    document.body.style.opacity = 1;
}
</script>
